<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pi coding agent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Courier New', monospace;
      background: #0f0f0f;
      color: #d0d0d0;
      min-height: 100vh;
      padding: 2rem;
    }

    h1 { color: #7eb8f7; font-size: 1.4rem; margin-bottom: 2rem; letter-spacing: 0.05em; }

    section { margin-bottom: 2rem; }

    label { display: block; font-size: 0.8rem; color: #777; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.08em; }

    textarea {
      width: 100%;
      background: #1a1a1a;
      color: #d0d0d0;
      border: 1px solid #333;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
      height: 100px;
      resize: vertical;
    }
    textarea:focus { border-color: #555; }

    .row { display: flex; gap: 8px; margin-top: 10px; align-items: center; }

    button {
      background: #1e4a8a;
      color: #d0d0d0;
      border: none;
      padding: 9px 18px;
      font-family: inherit;
      font-size: 0.85rem;
      cursor: pointer;
      white-space: nowrap;
    }
    button:hover { background: #2a5fa8; }
    button.danger { background: #7a1e1e; }
    button.danger:hover { background: #9a2a2a; }
    button:disabled { opacity: 0.4; cursor: default; }

    .msg { font-size: 0.8rem; color: #e06c6c; margin-left: 8px; }
    .msg.ok { color: #6cc97a; }

    hr { border: none; border-top: 1px solid #222; margin: 2rem 0; }

    h2 { color: #7eb8f7; font-size: 1rem; margin-bottom: 1rem; }

    .task {
      border: 1px solid #2a2a2a;
      margin-bottom: 8px;
    }
    .task-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      background: #161616;
    }
    .task-meta { display: flex; gap: 12px; align-items: center; }
    .badge {
      font-size: 0.7rem;
      padding: 2px 7px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .badge.RUNNING  { background: #1a4a2a; color: #6cc97a; }
    .badge.STOPPED  { background: #2a2a2a; color: #888; }
    .badge.PENDING  { background: #4a3a10; color: #c9a83c; }
    .task-id   { font-size: 0.75rem; color: #555; }
    .task-time { font-size: 0.75rem; color: #555; }
    .task-prompt {
      padding: 8px 12px;
      font-size: 0.8rem;
      color: #888;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border-top: 1px solid #1e1e1e;
    }
    .task-actions { display: flex; gap: 6px; }
    .task-actions button { padding: 5px 12px; font-size: 0.75rem; }

    .log-panel {
      display: none;
      background: #0a0a0a;
      padding: 12px;
      font-size: 0.78rem;
      max-height: 260px;
      overflow-y: auto;
      border-top: 1px solid #1e1e1e;
      white-space: pre-wrap;
      word-break: break-all;
      color: #aaa;
    }
    .log-panel.open { display: block; }
    .log-empty { color: #444; font-style: italic; }

    #task-list-empty { color: #444; font-size: 0.85rem; padding: 8px 0; }

    .api-banner {
      background: #2a1a0a;
      border: 1px solid #5a3a10;
      color: #c9a83c;
      padding: 10px 14px;
      font-size: 0.8rem;
      margin-bottom: 2rem;
    }
  </style>
</head>
<body>
  <h1>pi coding agent</h1>

  <div id="api-banner" class="api-banner" style="display:none">
    Backend not yet configured — API calls will fail. Deploy the API then refresh.
  </div>

  <section>
    <h2>New task</h2>
    <label>Prompt</label>
    <textarea id="prompt" placeholder="Fix the authentication bug in auth.py…"></textarea>
    <div class="row">
      <button id="start-btn" onclick="startTask()">Start agent</button>
      <span id="start-msg" class="msg"></span>
    </div>
  </section>

  <hr>

  <section>
    <div class="row" style="margin-top:0; margin-bottom:12px">
      <h2 style="margin:0">Tasks</h2>
      <button onclick="loadTasks()" style="padding:5px 12px; font-size:0.75rem">Refresh</button>
    </div>
    <div id="task-list"><p id="task-list-empty">No tasks yet.</p></div>
  </section>

  <script>
    const API = "";   // injected by Terraform once backend is deployed

    const logState = {};   // taskId -> { lines: [], nextToken: null }

    if (!API) document.getElementById("api-banner").style.display = "block";

    function headers() {
      return { "Content-Type": "application/json" };
    }

    async function apiFetch(path, opts) {
      if (!API) throw new Error("API_NOT_CONFIGURED");
      return fetch(API + path, { ...opts, headers: headers() });
    }

    async function startTask() {
      const prompt = document.getElementById("prompt").value.trim();
      const btn = document.getElementById("start-btn");
      const msg = document.getElementById("start-msg");
      if (!prompt) { msg.textContent = "Prompt is empty."; return; }
      btn.disabled = true;
      msg.textContent = "";
      try {
        const res = await apiFetch("/start", { method: "POST", body: JSON.stringify({ prompt }) });
        const data = await res.json();
        if (!res.ok) { msg.textContent = data.error || "Failed to start."; return; }
        msg.className = "msg ok";
        msg.textContent = "Started: " + data.taskId.slice(0, 8);
        document.getElementById("prompt").value = "";
        setTimeout(() => { msg.textContent = ""; msg.className = "msg"; }, 4000);
        await loadTasks();
        openLogs(data.taskId);
      } catch (e) {
        msg.textContent = e.message === "API_NOT_CONFIGURED" ? "API not configured yet." : "Request failed.";
      } finally {
        btn.disabled = false;
      }
    }

    async function loadTasks() {
      try {
        const res = await apiFetch("/tasks");
        const data = await res.json();
        renderTasks(data.tasks || []);
      } catch { /* silently ignore when API not configured */ }
    }

    function renderTasks(tasks) {
      const container = document.getElementById("task-list");
      if (!tasks.length) {
        container.innerHTML = '<p id="task-list-empty">No tasks yet.</p>';
        return;
      }
      container.innerHTML = tasks.map(t => {
        const short = t.taskId.slice(0, 8);
        const time  = t.startedAt ? new Date(t.startedAt).toLocaleString() : "";
        return `
        <div class="task" id="task-${t.taskId}">
          <div class="task-header">
            <div class="task-meta">
              <span class="badge ${t.status}">${t.status}</span>
              <span class="task-id">${short}</span>
              ${time ? '<span class="task-time">' + time + '</span>' : ""}
            </div>
            <div class="task-actions">
              ${t.status === "RUNNING" ? '<button class="danger" onclick="stopTask(\'' + t.taskId + '\')">Kill</button>' : ""}
              <button onclick="toggleLogs('${t.taskId}')">Logs</button>
            </div>
          </div>
          <div class="task-prompt">${esc(t.prompt || "(no prompt)")}</div>
          <div id="logs-${t.taskId}" class="log-panel"></div>
        </div>`;
      }).join("");
    }

    function openLogs(taskId) {
      const panel = document.getElementById("logs-" + taskId);
      if (panel) { panel.classList.add("open"); pollLogs(taskId); }
    }

    function toggleLogs(taskId) {
      const panel = document.getElementById("logs-" + taskId);
      if (!panel) return;
      if (panel.classList.contains("open")) {
        panel.classList.remove("open");
      } else {
        panel.classList.add("open");
        if (!logState[taskId]) pollLogs(taskId);
      }
    }

    async function pollLogs(taskId) {
      if (!logState[taskId]) logState[taskId] = { lines: [], nextToken: null };
      const state = logState[taskId];
      try {
        const qs = state.nextToken ? "?nextToken=" + encodeURIComponent(state.nextToken) : "";
        const res = await apiFetch("/logs/" + taskId + qs);
        const data = await res.json();
        state.lines.push(...(data.lines || []));
        state.nextToken = data.nextToken || null;

        const panel = document.getElementById("logs-" + taskId);
        if (panel) {
          panel.textContent = state.lines.length ? state.lines.join("\n") : "";
          if (!state.lines.length) panel.innerHTML = '<span class="log-empty">No logs yet…</span>';
          panel.scrollTop = panel.scrollHeight;
        }

        if (data.status === "RUNNING") setTimeout(() => pollLogs(taskId), 3000);
        else loadTasks();
      } catch { /* API not configured or task gone */ }
    }

    async function stopTask(taskId) {
      if (!confirm("Kill task " + taskId.slice(0, 8) + "?")) return;
      try {
        await apiFetch("/stop/" + taskId, { method: "POST" });
        loadTasks();
      } catch (e) {
        alert("Failed to stop task: " + e.message);
      }
    }

    function esc(s) {
      return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    loadTasks();
  </script>
</body>
</html>
