<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pi coding agent</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    /* Styles for dynamically-injected badge classes */
    .badge { font-size: 0.6rem; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.07em; font-weight: 700; }
    .badge.RUNNING { background: #dcfce7; color: #15803d; }
    .badge.STOPPED { background: #f3f4f6; color: #6b7280; }
    .badge.PENDING { background: #fef9c3; color: #a16207; }
    .log-panel { display: none; }
    .log-panel.open { display: block; }
    .input-card:focus-within { border-color: rgba(139, 92, 246, 0.4); box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.08); }
  </style>
</head>
<body class="min-h-screen bg-[#f7f7f8] text-gray-900 antialiased">

  <div class="flex flex-col items-center min-h-screen px-4 py-20">

    <!-- Heading -->
    <div class="text-center mb-10">
      <h1 class="text-[2.6rem] font-semibold text-gray-900 tracking-tight leading-tight mb-2">
        What can pi do for you?
      </h1>
      <p class="text-gray-400 text-sm">Describe a task and the agent will handle it</p>
    </div>

    <div class="w-full max-w-2xl">

      <!-- API warning -->
      <div id="api-banner" style="display:none"
        class="mb-4 rounded-xl bg-amber-50 border border-amber-200 text-amber-700 px-4 py-3 text-sm">
        Backend not yet configured — API calls will fail. Deploy the API then refresh.
      </div>

      <!-- Input card -->
      <div class="input-card rounded-2xl bg-white border border-gray-200 shadow-sm overflow-hidden transition-all duration-200">
        <textarea
          id="prompt"
          placeholder="Fix the authentication bug in auth.py…"
          class="w-full bg-transparent text-gray-900 placeholder-gray-400 px-5 pt-5 pb-3 text-base resize-none outline-none min-h-[160px] leading-relaxed"
        ></textarea>
        <div class="flex items-center px-4 pb-4 pt-2 border-t border-gray-100">
          <span id="start-msg" class="text-sm text-red-500"></span>
          <button
            id="start-btn"
            onclick="startTask()"
            class="ml-auto bg-gradient-to-r from-indigo-500 to-violet-600 hover:from-indigo-400 hover:to-violet-500 active:scale-[0.97] text-white font-medium px-6 py-2.5 rounded-xl text-sm transition-all duration-150 disabled:opacity-40 disabled:cursor-not-allowed shadow-lg shadow-violet-900/25 cursor-pointer"
          >
            Start agent →
          </button>
        </div>
      </div>
    </div>

    <!-- Sessions -->
    <div class="w-full max-w-2xl mt-12">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xs uppercase tracking-[0.15em] text-gray-400 font-medium">Recent sessions</h2>
        <button onclick="loadTasks()"
          class="text-xs text-gray-400 hover:text-gray-600 transition-colors cursor-pointer">
          ↻ Refresh
        </button>
      </div>
      <div id="task-list">
        <p id="task-list-empty" class="text-sm text-gray-700">No sessions yet.</p>
      </div>
    </div>

  </div>

  <script>
    const API = "/api";
    const logState   = {};
    const openPanels = new Set();

    function headers() {
      return { "Content-Type": "application/json" };
    }

    async function apiFetch(path, opts) {
      return fetch(API + path, { ...opts, headers: headers() });
    }

    async function startTask() {
      const prompt = document.getElementById("prompt").value.trim();
      const btn    = document.getElementById("start-btn");
      const msg    = document.getElementById("start-msg");
      if (!prompt) { msg.textContent = "Prompt is empty."; return; }
      btn.disabled = true;
      msg.textContent = "";
      try {
        const res  = await apiFetch("/start", { method: "POST", body: JSON.stringify({ prompt }) });
        const data = await res.json();
        if (!res.ok) { msg.textContent = data.error || "Failed to start."; return; }
        msg.className   = "text-sm text-emerald-600";
        msg.textContent = "Started: " + data.taskId.slice(0, 8);
        document.getElementById("prompt").value = "";
        setTimeout(() => { msg.textContent = ""; msg.className = "text-sm text-red-500"; }, 4000);
        await loadTasks();
        openLogs(data.taskId);
      } catch (e) {
        msg.textContent = e.message === "API_NOT_CONFIGURED" ? "API not configured yet." : "Request failed.";
      } finally {
        btn.disabled = false;
      }
    }

    async function loadTasks() {
      try {
        const res  = await apiFetch("/tasks");
        const data = await res.json();
        renderTasks(data.tasks || []);
      } catch { /* silently ignore when API not configured */ }
    }

    function renderTasks(tasks) {
      const container = document.getElementById("task-list");
      if (!tasks.length) {
        container.innerHTML = '<p class="text-sm text-gray-400">No sessions yet.</p>';
        return;
      }
      container.innerHTML = tasks.map(t => {
        const short = t.taskId.slice(0, 8);
        const time  = t.startedAt ? new Date(t.startedAt).toLocaleString() : "";
        return `
        <div id="task-${t.taskId}" class="mb-2 rounded-xl overflow-hidden border border-gray-200 bg-white">
          <div class="flex items-center justify-between px-4 py-3">
            <div class="flex items-center gap-3 min-w-0">
              <span class="badge ${t.status}">${t.status}</span>
              <span class="text-xs text-gray-400 font-mono">${short}</span>
              ${time ? `<span class="text-xs text-gray-400 hidden sm:inline">${time}</span>` : ""}
            </div>
            <div class="flex gap-1 ml-3 shrink-0">
              ${t.status === "RUNNING" ? `<button onclick="stopTask('${t.taskId}')" class="text-xs text-red-500 hover:text-red-700 px-3 py-1.5 rounded-lg hover:bg-red-50 transition-colors cursor-pointer">Kill</button>` : ""}
              <button onclick="toggleLogs('${t.taskId}')" class="text-xs text-gray-400 hover:text-gray-700 px-3 py-1.5 rounded-lg hover:bg-gray-100 transition-colors cursor-pointer">Logs</button>
            </div>
          </div>
          <div class="px-4 pb-3 text-xs text-gray-500 truncate border-t border-gray-100 pt-2">${esc(t.prompt || "(no prompt)")}</div>
          <div id="logs-${t.taskId}" class="log-panel bg-gray-50 px-4 py-3 text-xs font-mono text-gray-600 max-h-64 overflow-y-auto whitespace-pre-wrap break-all border-t border-gray-100"></div>
        </div>`;
      }).join("");

      for (const taskId of openPanels) {
        const panel = document.getElementById("logs-" + taskId);
        if (panel) { panel.classList.add("open"); renderLogPanel(taskId, panel); }
      }
    }

    function renderLogPanel(taskId, panel) {
      const state = logState[taskId];
      if (!state || !state.lines.length) {
        panel.innerHTML = '<span class="italic text-gray-400">No logs yet…</span>';
      } else {
        panel.textContent = state.lines.join("\n");
      }
      panel.scrollTop = panel.scrollHeight;
    }

    function openLogs(taskId) {
      openPanels.add(taskId);
      const panel = document.getElementById("logs-" + taskId);
      if (panel) { panel.classList.add("open"); pollLogs(taskId); }
    }

    function toggleLogs(taskId) {
      const panel = document.getElementById("logs-" + taskId);
      if (!panel) return;
      if (panel.classList.contains("open")) {
        panel.classList.remove("open");
        openPanels.delete(taskId);
      } else {
        panel.classList.add("open");
        openPanels.add(taskId);
        if (!logState[taskId]) {
          pollLogs(taskId);
        } else {
          renderLogPanel(taskId, panel);
        }
      }
    }

    async function pollLogs(taskId) {
      if (!logState[taskId]) logState[taskId] = { lines: [], nextToken: null };
      const state = logState[taskId];
      try {
        const qs   = state.nextToken ? "?nextToken=" + encodeURIComponent(state.nextToken) : "";
        const res  = await apiFetch("/logs/" + taskId + qs);
        const data = await res.json();
        state.lines.push(...(data.lines || []));
        state.nextToken = data.nextToken || null;

        const panel = document.getElementById("logs-" + taskId);
        if (panel && panel.classList.contains("open")) renderLogPanel(taskId, panel);

        if (data.status === "RUNNING") {
          setTimeout(() => pollLogs(taskId), 3000);
        } else {
          loadTasks();
        }
      } catch { /* silently ignore */ }
    }

    async function stopTask(taskId) {
      if (!confirm("Kill task " + taskId.slice(0, 8) + "?")) return;
      try {
        await apiFetch("/stop/" + taskId, { method: "POST" });
        loadTasks();
      } catch (e) {
        alert("Failed to stop task: " + e.message);
      }
    }

    function esc(s) {
      return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    loadTasks();
  </script>
</body>
</html>
